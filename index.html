<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Study Notes</title>
  <style>
    :root {
      --bg: #fafaf7;
      --panel: #fff;
      --border: #e2e2dc;
      --ink: #1a1a1a;
      --muted: #777;
      --accent: #6b4a1a;
      --gloss: #3a5a8a;
      --bracket: #6a6a6a;
      --tag-bg: #efe7d7;
      --tag-fg: #6b4a1a;
    }
    html, body { margin: 0; height: 100%; }
    body {
      font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--panel);
    }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    header .hint { color: var(--muted); font-size: 13px; }
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: 0;
    }
    main > section {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    main > section + section { border-left: 1px solid var(--border); }
    section h2 {
      margin: 0;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    #source {
      flex: 1;
      width: 100%;
      box-sizing: border-box;
      padding: 16px;
      border: 0;
      outline: 0;
      resize: none;
      background: transparent;
      color: var(--ink);
      font: 14px/1.55 ui-monospace, "SF Mono", Menlo, monospace;
    }
    #rendered {
      flex: 1;
      padding: 16px;
      overflow: auto;
    }
    .line { white-space: pre-wrap; min-height: 1.55em; }
    .line.line-empty { min-height: 1.55em; }
    .line.line-gloss { color: var(--gloss); }
    .seg-tag-span {
      display: inline-block;
      padding: 0 6px;
      margin: 0 3px 0 0;
      border-radius: 10px;
      background: var(--tag-bg);
      color: var(--tag-fg);
      font-size: .9em;
      font-weight: 600;
    }
    .bracket {
      color: var(--bracket);
      font-style: italic;
      background: rgba(0,0,0,.025);
      padding: 0 .15em;
      border-radius: 3px;
    }
    .bracket-delim { opacity: .45; font-style: normal; }
    .arrow {
      display: inline-block;
      padding: 0 .15em;
      color: var(--accent);
      font-weight: 600;
      user-select: all;
    }
  </style>
</head>
<body>
  <header>
    <h1>Study Notes</h1>
    <span class="hint">type on the left → rendered on the right · Phase 2 in progress</span>
  </header>
  <main>
    <section>
      <h2>Source</h2>
      <textarea id="source" spellcheck="false" placeholder="Paste source text. Try:
#Analogy
child -> man -> runs away from father
[moistened, electrified #elemental]
#Buddha: I pour down the rain of the Dharma,
-he will be paid double"></textarea>
    </section>
    <section>
      <h2>Rendered</h2>
      <div id="rendered"></div>
    </section>
  </main>

  <script src="./parser.js"></script>
  <script src="./renderer.js"></script>
  <script>
    const source = document.getElementById('source');
    const rendered = document.getElementById('rendered');

    const SAMPLE = [
      '#Analogy',
      'child -> man -> runs away from father, gone for 20-50 years -> increasingly impoverished',
      "father's treasury overflowing with riches and assets",
      '"He profited through lending and his trade with other countries was also great"',
      '',
      '4. Faith and Understanding',
      'chief sravakas:',
      "heard prediction -> filled w/wonder & ecstatic joy [moistened, electrified #elemental] -> homage -> rapt attention -> bow, veneration -> gaze at Buddha's face",
      '',
      '#Buddha: I pour down the rain of the Dharma,',
      'Fulfilling the world,',
      '#Sentient beings:',
      'And the sentient beings',
      'Practice the Dharma of one flavor',
      'According to their capacities.',
      '',
      '#small trees #irreversible bodhisattvas',
      'The heirs of the buddhas',
      'Who concentrate on the path of the Buddha,',
      '[turn their mind to the buddha way]',
      'Who always cultivate compassion within themselves',
      'And know definitely [for sure] without a doubt',
      'That they will become buddhas,',
      '',
      '#skillful means',
      'wanting to get his son back, the wealthy man employed',
      'skillful means and secretly dispatched two attendants of wretched and humble appearance',
      '-he will be paid double',
    ].join('\n');

    source.value = SAMPLE;

    function rerender() {
      rendered.textContent = '';
      const lines = source.value.split('\n');
      for (const raw of lines) {
        const parsed = Parser.parseLine(raw);
        parsed.raw = raw;
        rendered.appendChild(Renderer.renderLine(parsed, null, false));
      }
    }

    source.addEventListener('input', rerender);
    rerender();
  </script>
</body>
</html>
